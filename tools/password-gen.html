<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="keywords" content="密码生成器,在线密码生成,高强度密码,安全密码,密码工具">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://hukuanfu1220.github.io/my-website/tools/password-gen.html">
    <meta property="og:type" content="website">
    <meta property="og:title" content="密码生成器 — 高强度安全密码 | MyTools">
    <meta property="og:description" content="免费在线密码生成器，自定义长度和字符组合，生成高强度安全密码。">
    <meta property="og:url" content="https://hukuanfu1220.github.io/my-website/tools/password-gen.html">
    <meta property="og:locale" content="zh_CN">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='10' y='10' width='80' height='80' rx='15' fill='%236c5ce7'/><text x='50' y='68' text-anchor='middle' font-size='50' fill='white'>🛠</text></svg>">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="../index.html" class="nav-logo">🛠 MyTools</a>
            <ul class="nav-links">
                <li><a href="index.html">工具箱</a></li>
            </ul>
        </div>
    </nav>

    <header class="tool-page-header">
        <h1>🔐 密码生成器</h1>
        <p>自定义设置，生成高强度安全密码</p>
    </header>

    <main class="tool-container">
        <div class="tool-box">
            <h3>密码设置</h3>
            
            <div class="input-group">
                <label>密码长度</label>
                <div class="slider-group">
                    <input type="range" id="length" min="4" max="64" value="16" oninput="updateLengthDisplay()">
                    <span class="slider-value" id="lengthValue">16</span>
                </div>
            </div>

            <div class="input-group">
                <label>字符选项</label>
                <div class="checkbox-group">
                    <label class="checkbox-item">
                        <input type="checkbox" id="uppercase" checked> 大写字母 (A-Z)
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="lowercase" checked> 小写字母 (a-z)
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="numbers" checked> 数字 (0-9)
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="symbols" checked> 特殊符号 (!@#$)
                    </label>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" onclick="generatePassword()">⚡ 生成密码</button>
                <button class="btn btn-secondary" onclick="copyPassword()">📋 复制</button>
                <button class="btn btn-secondary" onclick="generatePassword()">🔄 重新生成</button>
            </div>
        </div>

        <div class="tool-box">
            <h3>生成的密码</h3>
            <div class="password-display" id="passwordDisplay">点击生成密码</div>
            <div class="strength-bar" id="strengthBar">
                <div class="strength-bar-fill" id="strengthFill"></div>
            </div>
            <p class="strength-text" id="strengthText"></p>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <p style="margin-bottom:0.5rem;">
                <a href="../index.html" style="color:rgba(255,255,255,0.7);">← 回到 hukuanfu 个人站</a>
            </p>
            <p>&copy; 2025 MyTools by <a href="../index.html" style="color:rgba(255,255,255,0.7);">hukuanfu</a>. 所有密码在浏览器本地生成，不会上传或保存。</p>
        </div>
    </footer>

    <div class="copied-toast" id="toast">已复制到剪贴板！</div>

    <script src="js/main.js"></script>
    <script src="js/password-gen.js"></script>
</body>
</html>

<body>
    <nav>
        <div class="nav-container">
            <a href="../index.html" class="nav-logo">🛠 MyTools</a>
            <ul class="nav-links">
                <li><a href="index.html">工具箱</a></li>
            </ul>
        </div>

    <header class="tool-page-header">
        <h1>{ } JSON 格式化工具</h1>
        <p>粘贴 JSON 数据，即时美化或压缩</p>
    </header>

    <main class="tool-container">
        <div class="tool-box">
            <div class="input-group">
                <label for="jsonInput">输入 JSON</label>
                <textarea id="jsonInput" placeholder='粘贴你的 JSON 数据...' style="min-height:200px;font-family:'Courier New',monospace;font-size:0.9rem;"></textarea>
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="formatJSON()">✨ 格式化</button>
                <button class="btn btn-secondary" onclick="compressJSON()">📦 压缩</button>
                <button class="btn btn-secondary" onclick="validateJSON()">✅ 校验</button>
                <button class="btn btn-secondary" onclick="copyResult()">📋 复制结果</button>
                <button class="btn btn-secondary" onclick="clearAll()">🗑 清空</button>
            </div>
        </div>

        <div class="tool-box">
            <h3>结果</h3>
            <div id="jsonOutput" style="background:#f8f9fa;border-radius:8px;padding:1.5rem;min-height:100px;font-family:'Courier New',monospace;font-size:0.9rem;white-space:pre-wrap;word-break:break-all;color:var(--dark);">结果将在这里显示...</div>
            <div id="jsonStatus" style="margin-top:1rem;padding:0.75rem 1rem;border-radius:8px;display:none;"></div>
        </div>
    </main>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav>
        <div class="nav-container">
            <a href="index.html" class="nav-logo">MySite</a>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">首页</a></li>
                <li><a href="about.html">关于</a></li>
                <li><a href="contact.html" class="active">联系</a></li>
            </ul>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- 联系 Hero -->
    <section class="contact-hero">
        <h1>联系我</h1>
        <p>有任何想法或合作意向？随时与我取得联系</p>
    </section>

    <!-- 联系内容 -->
    <section class="contact-content">
        <div class="container">
            <div class="contact-grid">
                <div class="contact-info animate-on-scroll">
                    <div class="contact-item">
                        <div class="contact-item-icon">📧</div>
                        <div>
                            <h4>邮箱</h4>
                            <p>hukuanfu@example.com</p>
                        </div>
                    </div>
                    <div class="contact-item">
                        <div class="contact-item-icon">🐙</div>
                        <div>
                            <h4>GitHub</h4>
                            <p>github.com/hukuanfu1220</p>
                        </div>
                    </div>
                    <div class="contact-item">
                        <div class="contact-item-icon">📍</div>
                        <div>
                            <h4>位置</h4>
                            <p>中国</p>
                        </div>
                    </div>
                    <div class="contact-item">
                        <div class="contact-item-icon">⏰</div>
                        <div>
                            <h4>响应时间</h4>
                            <p>通常 24 小时内回复</p>
                        </div>
                    </div>
                </div>
                <form class="contact-form animate-on-scroll" onsubmit="handleSubmit(event)">
                    <div class="form-group">
                        <label for="name">姓名</label>
                        <input type="text" id="name" placeholder="你的名字" required>
                    </div>
                    <div class="form-group">
                        <label for="email">邮箱</label>
                        <input type="email" id="email" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="message">留言</label>
                        <textarea id="message" placeholder="写下你想说的话..." required></textarea>
                    </div>
                    <button type="submit" class="btn-submit">发送消息</button>
                </form>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer>
        <div class="footer-content">
            <div class="footer-links">
                <a href="index.html">首页</a>
                <a href="about.html">关于</a>
                <a href="contact.html">联系</a>
            </div>
            <p>&copy; 2025 MySite. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
